name: iOS Release Build

on:
  push:
    branches: [ master ]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'ios/**'
      - '.github/workflows/ios-release.yml'
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload to TestFlight after build?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      build_number_override:
        description: 'Build number (leave empty to use default)'
        required: false
        default: ''

jobs:
  build-ios:
    name: 🍎 Build & Sign iOS IPA
    # Using macos-15 runner which has Xcode 16 / Xcode 26 SDKs
    runs-on: macos-15

    steps:
      # ─────────────────────────────────────────────
      # 0. Set up Xcode (required to avoid SDK mismatches)
      # ─────────────────────────────────────────────
      - name: 🍏 Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ─────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Flutter Setup
      # ─────────────────────────────────────────────
      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ─────────────────────────────────────────────
      # 3. Install Flutter Dependencies
      # ─────────────────────────────────────────────
      - name: 📦 Install Flutter dependencies
        run: |
          # flutter clean is vital to clear outdated cached builds
          flutter clean
          flutter pub get

      # ─────────────────────────────────────────────
      # 5. Setup Keychain & Install Certificate
      # ─────────────────────────────────────────────
      - name: 🔑 Install Apple Distribution Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain

          CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12
          echo -n "$CERTIFICATE_BASE64" | tr -cd 'A-Za-z0-9+/=' | base64 -D > $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH \
            -k $KEYCHAIN_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            $KEYCHAIN_PATH

      # ─────────────────────────────────────────────
      # 6. Install Provisioning Profile
      # ─────────────────────────────────────────────
      - name: 📋 Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_MOBILE_PROVISION }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | tr -cd 'A-Za-z0-9+/=' | base64 -D > $PROFILE_PATH

          UUID=$(security cms -D -i $PROFILE_PATH | plutil -extract UUID raw -)
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> $GITHUB_ENV

          PROFILE_NAME=$(security cms -D -i $PROFILE_PATH | plutil -extract Name raw -)
          echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

          # Extract Bundle ID from profile
          APP_ID=$(security cms -D -i $PROFILE_PATH | plutil -extract Entitlements.application-identifier raw -)
          BUNDLE_ID_FROM_PROFILE=$(echo $APP_ID | sed 's/^[^\.]*\.//')
          echo "BUNDLE_ID_FROM_PROFILE=$BUNDLE_ID_FROM_PROFILE" >> $GITHUB_ENV

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # ─────────────────────────────────────────────
      # 7. Setup ExportOptions.plist
      # ─────────────────────────────────────────────
      - name: 📝 Create ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ secrets.BUNDLE_IDENTIFIER }}</key>
              <string>${{ env.PROVISIONING_PROFILE_NAME }}</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      # ─────────────────────────────────────────────
      # 8. Set Build Number
      # ─────────────────────────────────────────────
      - name: 🔢 Set Build Number
        run: |
          if [ -n "${{ github.event.inputs.build_number_override }}" ]; then
            BUILD_NUMBER="${{ github.event.inputs.build_number_override }}"
          else
            BUILD_NUMBER="${{ github.run_number }}"
          fi
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 9. Build Flutter iOS
      # ─────────────────────────────────────────────
      - name: 🔨 Build iOS (no codesign)
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-number=${{ env.BUILD_NUMBER }}

      # ─────────────────────────────────────────────
      # 9.5 Update Xcode Project for Manual Signing
      # ─────────────────────────────────────────────
      - name: 📝 Update Xcode Project for Manual Signing
        run: |
          PBX_FILE="ios/Runner.xcodeproj/project.pbxproj"
          # Use macOS sed syntax (sed -i '') to update manual signing style
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' $PBX_FILE
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' $PBX_FILE || true

          if [ "$BUNDLE_ID_FROM_PROFILE" != "*" ]; then
            sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID_FROM_PROFILE;/g" $PBX_FILE
          fi

          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Distribution"; PROVISIONING_PROFILE_SPECIFIER = "'"$PROVISIONING_PROFILE_NAME"'";/g' $PBX_FILE

      # ─────────────────────────────────────────────
      # 10. Archive & Export IPA
      # ─────────────────────────────────────────────
      - name: 📦 Archive & Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            CODE_SIGN_STYLE=Manual

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      # ─────────────────────────────────────────────
      # 11. Upload IPA as Artifact
      # ─────────────────────────────────────────────
      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30
          if-no-files-found: error

      # ─────────────────────────────────────────────
      # 12. Upload to TestFlight
      # ─────────────────────────────────────────────
      - name: 🔍 Find IPA Path
        id: find_ipa
        if: github.event.inputs.upload_to_testflight == 'true' || github.ref == 'refs/heads/master'
        run: |
          IPA_PATH=$(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1)
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT

      - name: 🚀 Upload to TestFlight
        if: github.event.inputs.upload_to_testflight == 'true' || github.ref == 'refs/heads/master'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.find_ipa.outputs.ipa_path }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      # ─────────────────────────────────────────────
      # 13. Cleanup Keychain
      # ─────────────────────────────────────────────
      - name: 🧹 Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain 2>/dev/null || true
          rm -f $RUNNER_TEMP/*.p12
          rm -f $RUNNER_TEMP/*.mobileprovision
          rm -f $RUNNER_TEMP/*.p8
